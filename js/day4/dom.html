<input type="password" id="password">

<button onclick="togglePassword()">
    Show Password
</button>

  <script>

   
   const password = document.getElementById("password");

const toggle = () => {

    let isVisible = false;

    const innerFunction = () => {

        if (isVisible) {

            password.type = "password";
            event.target.innerText = "Show Password";

        } else {

            password.type = "text";
            event.target.innerText = "Hide Password";

        }

        isVisible = !isVisible;

    }

    return innerFunction;

}

const togglePassword = toggle();
    
     
     const product=async()=>{

        const productlist= await fetch("https://dummyjson.com/products")

        let res=await productlist.json()

        let result=res.products

         const products=document.getElementById("products")

         products.innerHTML = "";

         result.forEach((product)=>{

                products.innerHTML +=`
                  
                    <ul>
                <li><strong>Category:</strong> ${product.category}</li>
                <li><strong>Price:</strong> ₹${product.price}</li>
                <li><strong>Discount:</strong> ${product.discountPercentage}%</li>
            </ul>
            <hr>

                `
            })
        }
